<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hukuk Otomasyon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding: 16px;
            padding-top: env(safe-area-inset-top);
        }

        /* Liquid Glass Header */
        .glass-header {
            position: sticky; top: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 24px; margin-bottom: 24px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .percentage {
            font-size: 3.5rem; font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; font-variant-numeric: tabular-nums;
        }

        .stats-text { font-size: 0.8rem; color: #94a3b8; letter-spacing: 1.5px; }

        .progress-bar-bg {
            height: 10px; background: rgba(0, 0, 0, 0.3);
            border-radius: 20px; margin-top: 20px; overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%; background: linear-gradient(90deg, #4f46e5, #9333ea);
            width: 0%; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .search-box {
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 14px; border-radius: 14px; color: white; margin-bottom: 15px; outline: none;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab {
            flex: 1; padding: 12px; text-align: center; font-size: 0.85rem;
            background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid transparent; color: #94a3b8;
        }
        .tab.active { background: var(--glass); border-color: var(--primary); color: white; font-weight: 600; }

        .file-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 16px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .file-info h4 { font-size: 1.1rem; color: #f1f5f9; margin-bottom: 4px; }
        .file-info p { font-size: 0.8rem; color: #64748b; }

        .btn-check { 
            width: 44px; height: 44px; border-radius: 14px; border: none;
            display: flex; align-items: center; justify-content: center;
            background: rgba(16, 185, 129, 0.15); color: var(--accent); 
        }
        
        .loading-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">Veriler Güncelleniyor...</div>

    <div class="glass-header">
        <div class="percentage" id="percDisplay">%0,00</div>
        <div class="stats-text">KARAR: <span id="resolvedCount">661</span> / 1147</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
    </div>

    <input type="text" class="search-box" id="searchBox" placeholder="Dosya ara..." oninput="render()">

    <div class="tabs">
        <div class="tab active" id="tabPending" onclick="switchTab('pending')">Bekleyenler</div>
        <div class="tab" id="tabDone" onclick="switchTab('resolved')">Kararlar</div>
    </div>

    <div id="fileList"></div>

    <script>
        // BURAYA GOOGLE SPREADSHEET CSV LINKINI YAPIŞTIR
        const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQqPPEj3gfAo7qkrxuB9Jtj2SGH4yuAqIj1Sm8MX_jONrCDM0rna_XyAn4bC4NEiiGAVw-xkZ-QOaFY/pub?output=xlsx';
        
        const TOTAL_FILES = 1147;
        const BASE_RESOLVED = 661;
        
        let allData = []; // Google'dan gelen ham veri
        let resolvedIds = JSON.parse(localStorage.getItem('resolvedFiles')) || [];
        let currentTab = 'pending';

        async function fetchData() {
            try {
                const response = await fetch(GOOGLE_SHEET_URL);
                const csvData = await response.text();
                
                Papa.parse(csvData, {
                    header: true,
                    complete: function(results) {
                        // Sütun isimlerini normalize ediyoruz (Boşlukları sil, küçük harf yap)
                        allData = results.data.map((row, index) => {
                            const keys = Object.keys(row);
                            return {
                                id: row["Dosya Numarası"] || row["Dosya No"] || index,
                                num: row["Dosya Numarası"] || row["Dosya No"] || "İsimsiz Dosya",
                                date: row["Tarih"] || "",
                                year: row["Yıl"] || ""
                            };
                        });
                        document.getElementById('loader').style.display = 'none';
                        render();
                    }
                });
            } catch (error) {
                alert("Veri çekilemedi. Linki kontrol edin.");
            }
        }

        function render() {
            const list = document.getElementById('fileList');
            const search = document.getElementById('searchBox').value.toLowerCase();
            list.innerHTML = '';
            
            // Karar durumunu eşleştir
            const processedData = allData.map(f => ({
                ...f,
                status: resolvedIds.includes(f.id) ? 'resolved' : 'pending'
            }));

            const filtered = processedData.filter(f => 
                f.status === currentTab && 
                f.num.toString().toLowerCase().includes(search)
            );

            const currentTotalResolved = BASE_RESOLVED + resolvedIds.length;
            const perc = (currentTotalResolved / TOTAL_FILES * 100).toFixed(2);

            document.getElementById('percDisplay').innerText = `%${perc.replace('.', ',')}`;
            document.getElementById('resolvedCount').innerText = currentTotalResolved;
            document.getElementById('progressBar').style.width = `${perc}%`;

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="file-info">
                        <h4>${f.num}</h4>
                        <p>${f.date} ${f.year ? '• ' + f.year : ''}</p>
                    </div>
                    <button class="btn-check" onclick="toggleStatus('${f.id}')">
                        <i data-lucide="${f.status === 'pending' ? 'check' : 'undo-2'}"></i>
                    </button>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function toggleStatus(id) {
            if (resolvedIds.includes(id)) {
                resolvedIds = resolvedIds.filter(i => i !== id);
            } else {
                resolvedIds.push(id);
            }
            localStorage.setItem('resolvedFiles', JSON.stringify(resolvedIds));
            render();
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tabPending').classList.toggle('active', t === 'pending');
            document.getElementById('tabDone').classList.toggle('active', t === 'resolved');
            render();
        }

        fetchData();
    </script>
</body>
</html>
