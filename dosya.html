<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dosya Takip Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding: 16px;
            padding-top: env(safe-area-inset-top);
        }

        /* Liquid Glass Progress Card */
        .glass-header {
            position: sticky;
            top: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .percentage {
            font-size: 3.2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .stats-text {
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .progress-bar-bg {
            height: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #9333ea);
            width: 0%;
            transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        /* Excel Upload Section */
        .upload-section {
            background: var(--glass);
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .upload-section:hover { border-color: var(--primary); }

        #excelInput { display: none; }

        /* Action Area */
        .action-area {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .input-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; margin-bottom: 12px; }

        input[type="text"], input[type="date"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            width: 100%;
            outline: none;
        }

        .btn-main {
            background: var(--primary);
            color: white; border: none; padding: 16px;
            border-radius: 14px; width: 100%; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Tabs & List */
        .tabs { display: flex; gap: 10px; margin-bottom: 18px; }
        .tab {
            flex: 1; padding: 12px; text-align: center;
            background: rgba(255,255,255,0.03);
            border-radius: 12px; font-size: 0.85rem; cursor: pointer;
            border: 1px solid transparent; color: #94a3b8;
        }
        .tab.active { background: var(--glass); border-color: var(--primary); color: white; font-weight: 600; }

        .file-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-info h4 { font-size: 1.15rem; margin-bottom: 4px; color: #f1f5f9; }
        .file-info p { font-size: 0.85rem; color: #64748b; }

        .item-actions { display: flex; gap: 12px; }
        .btn-circle {
            width: 44px; height: 44px; border-radius: 14px; border: none;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-done { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
        .btn-del { background: rgba(244, 63, 94, 0.1); color: #f43f5e; }
        
        .reset-btn {
            background: none; border: none; color: #64748b; font-size: 0.7rem;
            margin-top: 10px; text-decoration: underline; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="glass-header">
        <div class="percentage" id="percDisplay">%0,00</div>
        <div class="stats-text">
            KARAR: <span id="resolvedCount">661</span> / 1147 DOSYA
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="upload-section" onclick="document.getElementById('excelInput').click()">
        <i data-lucide="file-up" style="margin-bottom: 8px;"></i>
        <p style="font-size: 0.9rem; font-weight: 600;">Excel Dosyası Yükle</p>
        <p style="font-size: 0.7rem; color: #94a3b8;">(Dosya No, Tarih, Yıl sütunları olmalı)</p>
        <input type="file" id="excelInput" accept=".xlsx, .xls, .csv">
    </div>

    <div class="action-area">
        <div class="input-row">
            <input type="text" id="fNum" placeholder="Dosya No">
            <input type="date" id="fDate">
        </div>
        <button class="btn-main" onclick="addFile()">
            <i data-lucide="plus-circle"></i> Manuel Kayıt Ekle
        </button>
    </div>

    <div class="tabs">
        <div class="tab active" id="tabPending" onclick="switchTab('pending')">Bekleyenler</div>
        <div class="tab" id="tabDone" onclick="switchTab('resolved')">Karar Verilenler</div>
    </div>

    <div id="fileList"></div>
    
    <center><button class="reset-btn" onclick="resetData()">Tüm Verileri Sıfırla</button></center>

    <script>
        const TOTAL_FILES = 1147;
        const BASE_RESOLVED = 661;

        let files = JSON.parse(localStorage.getItem('lawExcelApp')) || [];
        let currentTab = 'pending';

        // Excel Okuma İşlemi
        document.getElementById('excelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(evt) {
                const bstr = evt.target.result;
                const wb = XLSX.read(bstr, { type: 'binary' });
                const wsname = wb.SheetNames[0];
                const ws = wb.Sheets[wsname];
                const data = XLSX.utils.sheet_to_json(ws);

                // Excel verilerini sistem formatına çevir
                const importedFiles = data.map((row, index) => ({
                    id: Date.now() + index,
                    num: row["Dosya No"] || row["dosya no"] || "Belirtilmedi",
                    date: row["Tarih"] || row["tarih"] || "",
                    year: row["Yıl"] || row["yıl"] || "",
                    status: "pending"
                }));

                files = [...files, ...importedFiles];
                save();
                render();
                alert(importedFiles.length + " dosya başarıyla eklendi!");
            };
            reader.readAsBinaryString(file);
        });

        function render() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            const filtered = files.filter(f => f.status === currentTab);
            const resolvedCount = files.filter(f => f.status === 'resolved').length;
            const currentTotalResolved = BASE_RESOLVED + resolvedCount;
            const perc = (currentTotalResolved / TOTAL_FILES * 100).toFixed(2);

            document.getElementById('percDisplay').innerText = `%${perc.replace('.', ',')}`;
            document.getElementById('resolvedCount').innerText = currentTotalResolved;
            document.getElementById('progressBar').style.width = `${perc}%`;

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="file-info" onclick="editFile(${f.id})">
                        <h4>${f.num}</h4>
                        <p>${f.date ? f.date : 'Tarih Yok'} ${f.year ? '• ' + f.year : ''}</p>
                    </div>
                    <div class="item-actions">
                        <button class="btn-circle btn-done" onclick="toggleStatus(${f.id})">
                            <i data-lucide="${f.status === 'pending' ? 'check' : 'undo-2'}"></i>
                        </button>
                        <button class="btn-circle btn-del" onclick="deleteFile(${f.id})">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function addFile() {
            const num = document.getElementById('fNum').value;
            const date = document.getElementById('fDate').value;
            if(!num) return alert("Dosya No boş olamaz!");
            files.push({ id: Date.now(), num, date, year: date ? new Date(date).getFullYear() : "", status: 'pending' });
            save(); render();
            document.getElementById('fNum').value = '';
        }

        function toggleStatus(id) {
            files = files.map(f => f.id === id ? {...f, status: f.status === 'pending' ? 'resolved' : 'pending'} : f);
            save(); render();
        }

        function deleteFile(id) {
            if(confirm('Silinsin mi?')) { files = files.filter(f => f.id !== id); save(); render(); }
        }

        function editFile(id) {
            const f = files.find(x => x.id === id);
            const newNum = prompt("Dosya Numarasını Düzenle:", f.num);
            if(newNum) { f.num = newNum; save(); render(); }
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tabPending').classList.toggle('active', t === 'pending');
            document.getElementById('tabDone').classList.toggle('active', t === 'resolved');
            render();
        }

        function save() { localStorage.setItem('lawExcelApp', JSON.stringify(files)); }
        function resetData() { if(confirm('TÜM VERİLER SİLİNECEK! Emin misiniz?')) { localStorage.clear(); location.reload(); } }

        render();
    </script>
</body>
</html>
