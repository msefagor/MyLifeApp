<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hukuk Dosya Takip</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding: 16px;
            padding-top: env(safe-area-inset-top);
        }

        /* Liquid Glass Header */
        .glass-header {
            position: sticky; top: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 24px; margin-bottom: 24px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .percentage {
            font-size: 3.5rem; font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; font-variant-numeric: tabular-nums;
        }

        .stats-text { font-size: 0.8rem; color: #94a3b8; letter-spacing: 1.5px; text-transform: uppercase; }

        .progress-bar-bg {
            height: 10px; background: rgba(0, 0, 0, 0.3);
            border-radius: 20px; margin-top: 20px; overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%; background: linear-gradient(90deg, #4f46e5, #9333ea);
            width: 0%; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .search-box {
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 16px; color: white; margin-bottom: 15px; outline: none;
            font-size: 1rem;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab {
            flex: 1; padding: 12px; text-align: center; font-size: 0.85rem;
            background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid transparent; color: #94a3b8;
        }
        .tab.active { background: var(--glass); border-color: var(--primary); color: white; font-weight: 600; }

        .file-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .file-info h4 { font-size: 1.1rem; color: #f1f5f9; margin-bottom: 4px; }
        .file-info p { font-size: 0.8rem; color: #64748b; }

        .btn-check { 
            width: 46px; height: 46px; border-radius: 14px; border: none;
            display: flex; align-items: center; justify-content: center;
            background: rgba(16, 185, 129, 0.15); color: var(--accent); 
        }

        .loading-overlay {
            position: fixed; inset: 0; background: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        
        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--glass);
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p>E-Tablo Verileri Yükleniyor...</p>
    </div>

    <div class="glass-header">
        <div class="percentage" id="percDisplay">%0,00</div>
        <div class="stats-text">KARAR: <span id="resolvedCount">661</span> / 1147</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
    </div>

    <input type="text" class="search-box" id="searchBox" placeholder="Dosya No veya Tarih ile ara..." oninput="render()">

    <div class="tabs">
        <div class="tab active" id="tabPending" onclick="switchTab('pending')">Bekleyenler</div>
        <div class="tab" id="tabDone" onclick="switchTab('resolved')">Kararlar</div>
    </div>

    <div id="fileList"></div>

    <script>
        // BURAYA GOOGLE SPREADSHEET MICROSOFT EXCEL LINKINI YAPIŞTIR
        const EXCEL_PUBLISH_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQqPPEj3gfAo7qkrxuB9Jtj2SGH4yuAqIj1Sm8MX_jONrCDM0rna_XyAn4bC4NEiiGAVw-xkZ-QOaFY/pub?output=xlsx';
        
        const TOTAL_FILES = 1147;
        const BASE_RESOLVED = 661;
        
        let allData = []; 
        let resolvedIds = JSON.parse(localStorage.getItem('resolvedFiles_v4')) || [];
        let currentTab = 'pending';

        async function fetchExcelData() {
            try {
                const response = await fetch(EXCEL_PUBLISH_URL);
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);

                // Verileri sütun isimlerine göre eşle
                allData = jsonData.map((row, index) => {
                    // Esnek sütun bulma (büyük/küçük harf duyarlılığını azaltmak için)
                    const findVal = (names) => {
                        const key = Object.keys(row).find(k => names.includes(k.trim()));
                        return key ? row[key] : "";
                    };

                    const num = findVal(["Dosya Numarası", "Dosya No", "dosya numarası"]);
                    return {
                        id: num || `idx-${index}`,
                        num: num || "Bilinmeyen Dosya",
                        date: findVal(["Tarih", "tarih"]),
                        year: findVal(["Yıl", "yıl"])
                    };
                });

                document.getElementById('loader').style.display = 'none';
                render();
            } catch (error) {
                console.error(error);
                alert("Excel verisi çekilemedi. Lütfen linki ve internetinizi kontrol edin.");
            }
        }

        function render() {
            const list = document.getElementById('fileList');
            const search = document.getElementById('searchBox').value.toLowerCase();
            list.innerHTML = '';
            
            const processedData = allData.map(f => ({
                ...f,
                status: resolvedIds.includes(f.id.toString()) ? 'resolved' : 'pending'
            }));

            const filtered = processedData.filter(f => 
                f.status === currentTab && 
                (f.num.toString().toLowerCase().includes(search) || f.date.toString().toLowerCase().includes(search))
            );

            const currentTotalResolved = BASE_RESOLVED + resolvedIds.length;
            const perc = (currentTotalResolved / TOTAL_FILES * 100).toFixed(2);

            document.getElementById('percDisplay').innerText = `%${perc.replace('.', ',')}`;
            document.getElementById('resolvedCount').innerText = currentTotalResolved;
            document.getElementById('progressBar').style.width = `${perc}%`;

            if(filtered.length === 0) {
                list.innerHTML = '<p style="text-align:center; padding:20px; color:#64748b;">Kayıt bulunamadı.</p>';
            }

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="file-info">
                        <h4>${f.num}</h4>
                        <p>${f.date} ${f.year ? '• ' + f.year : ''}</p>
                    </div>
                    <button class="btn-check" onclick="toggleStatus('${f.id}')">
                        <i data-lucide="${f.status === 'pending' ? 'check' : 'undo-2'}"></i>
                    </button>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function toggleStatus(id) {
            id = id.toString();
            if (resolvedIds.includes(id)) {
                resolvedIds = resolvedIds.filter(i => i !== id);
            } else {
                resolvedIds.push(id);
            }
            localStorage.setItem('resolvedFiles_v4', JSON.stringify(resolvedIds));
            render();
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tabPending').classList.toggle('active', t === 'pending');
            document.getElementById('tabDone').classList.toggle('active', t === 'resolved');
            render();
        }

        fetchExcelData();
    </script>
</body>
</html>
