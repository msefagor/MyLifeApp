<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hukuk Dosya Takip</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding: 16px;
            padding-top: env(safe-area-inset-top);
        }

        /* Liquid Glass Progress Card */
        .glass-header {
            position: sticky;
            top: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .percentage {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        .stats-text {
            font-size: 0.8rem;
            color: #94a3b8;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #9333ea);
            width: 0%;
            transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        /* Excel Upload */
        .upload-zone {
            background: var(--glass);
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .upload-zone:active { background: rgba(255,255,255,0.1); }

        /* Action Buttons */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn {
            border: none; border-radius: 14px; padding: 14px; color: white;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); }
        .btn-outline { background: var(--glass); border: 1px solid var(--glass-border); }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab {
            flex: 1; padding: 12px; text-align: center; font-size: 0.85rem;
            background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid transparent; color: #94a3b8;
        }
        .tab.active { background: var(--glass); border-color: var(--primary); color: white; font-weight: 600; }

        /* List Items */
        .file-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .file-info h4 { font-size: 1.1rem; color: #f1f5f9; margin-bottom: 4px; }
        .file-info p { font-size: 0.8rem; color: #64748b; }

        .item-btns { display: flex; gap: 10px; }
        .circle-btn {
            width: 44px; height: 44px; border-radius: 14px; border: none;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-check { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
        .btn-trash { background: rgba(244, 63, 94, 0.1); color: #f43f5e; }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="glass-header">
        <div class="percentage" id="percDisplay">%0,00</div>
        <div class="stats-text">
            KARAR: <span id="resolvedCount">661</span> / 1147 DOSYA
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".csv">
    
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <i data-lucide="file-spreadsheet"></i>
        <p style="margin-top: 8px; font-weight: 600;">CSV Dosyasını Yükle</p>
        <p style="font-size: 0.7rem; color: #64748b;">(Betü Dosyalar Yapısında)</p>
    </div>

    <div class="action-grid">
        <button class="btn btn-primary" onclick="addNewManual()">
            <i data-lucide="plus"></i> Manuel Ekle
        </button>
        <button class="btn btn-outline" onclick="resetAll()">
            <i data-lucide="refresh-cw"></i> Sıfırla
        </button>
    </div>

    <div class="tabs">
        <div class="tab active" id="tabPending" onclick="switchTab('pending')">Bekleyenler</div>
        <div class="tab" id="tabDone" onclick="switchTab('resolved')">Karar Verilenler</div>
    </div>

    <div id="fileList"></div>

    <script>
        const TOTAL_FILES = 1147;
        const BASE_RESOLVED = 661;
        let files = JSON.parse(localStorage.getItem('lawAppFiles')) || [];
        let currentTab = 'pending';

        // Dosya Yükleme (CSV Okuma)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const newItems = results.data.map((row, idx) => ({
                        id: Date.now() + idx,
                        num: row["Dosya Numarası"] || "No Bilgisi Yok",
                        date: row["Tarih"] || "",
                        year: row["Yıl"] || "",
                        status: "pending"
                    }));
                    files = [...files, ...newItems];
                    saveAndRender();
                    alert(newItems.length + " dosya listeye eklendi!");
                }
            });
        });

        function saveAndRender() {
            localStorage.setItem('lawAppFiles', JSON.stringify(files));
            render();
        }

        function render() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            
            const filtered = files.filter(f => f.status === currentTab);
            const resolvedSessionCount = files.filter(f => f.status === 'resolved').length;
            const currentTotalResolved = BASE_RESOLVED + resolvedSessionCount;
            const perc = (currentTotalResolved / TOTAL_FILES * 100).toFixed(2);

            document.getElementById('percDisplay').innerText = `%${perc.replace('.', ',')}`;
            document.getElementById('resolvedCount').innerText = currentTotalResolved;
            document.getElementById('progressBar').style.width = `${perc}%`;

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="file-info" onclick="editFile(${f.id})">
                        <h4>${f.num}</h4>
                        <p>${f.date ? f.date : 'Tarih Yok'} ${f.year ? '• ' + f.year : ''}</p>
                    </div>
                    <div class="item-btns">
                        <button class="circle-btn btn-check" onclick="toggleStatus(${f.id})">
                            <i data-lucide="${f.status === 'pending' ? 'check' : 'undo-2'}"></i>
                        </button>
                        <button class="circle-btn btn-trash" onclick="deleteFile(${f.id})">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function toggleStatus(id) {
            files = files.map(f => f.id === id ? {...f, status: f.status === 'pending' ? 'resolved' : 'pending'} : f);
            saveAndRender();
        }

        function deleteFile(id) {
            if(confirm('Dosya listeden silinsin mi?')) {
                files = files.filter(f => f.id !== id);
                saveAndRender();
            }
        }

        function editFile(id) {
            const f = files.find(x => x.id === id);
            const newNum = prompt("Dosya Numarasını Güncelle:", f.num);
            if(newNum) { f.num = newNum; saveAndRender(); }
        }

        function addNewManual() {
            const num = prompt("Dosya Numarasını Girin:");
            if(!num) return;
            files.push({ id: Date.now(), num, date: "", year: "", status: 'pending' });
            saveAndRender();
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tabPending').classList.toggle('active', t === 'pending');
            document.getElementById('tabDone').classList.toggle('active', t === 'resolved');
            render();
        }

        function resetAll() {
            if(confirm('Tüm verileri silmek istediğinize emin misiniz?')) {
                files = [];
                localStorage.removeItem('lawAppFiles');
                render();
            }
        }

        render();
    </script>
</body>
</html>
