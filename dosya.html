<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hukuk Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --primary: #6366f1; --accent: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; padding: 16px; }

        /* Liquid Glass Header */
        .header {
            position: sticky; top: 10px; z-index: 100;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 20px; margin-bottom: 20px; text-align: center;
        }
        .percentage { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .progress-bar { height: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #9333ea); width: 0%; transition: 1s; }

        /* Search & Tabs */
        .search-box { width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: rgba(255,255,255,0.03); border-radius: 12px; font-size: 0.8rem; color: #94a3b8; cursor: pointer; }
        .tab.active { background: var(--glass); border: 1px solid var(--primary); color: white; }

        /* File Cards */
        .file-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .file-info h4 { font-size: 1.2rem; color: #fff; letter-spacing: 0.5px; }
        .file-info p { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
        
        .actions { display: flex; gap: 8px; }
        .btn-icon { width: 38px; height: 38px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; transition: 0.2s; }
        .btn-check { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .btn-edit { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .btn-del { background: rgba(244, 63, 94, 0.2); color: #f43f5e; }

        .loader { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader" class="loader">Veriler E-Tablodan Çekiliyor...</div>

    <div class="header">
        <div class="percentage" id="percDisplay">%0,00</div>
        <div id="stats" style="font-size: 0.8rem; color: #94a3b8;">Yükleniyor...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <input type="text" class="search-box" id="searchBox" placeholder="Dosya No veya Tarih ile ara..." oninput="render()">

    <div class="tabs">
        <div class="tab active" id="tabPending" onclick="switchTab('pending')">Bekleyenler</div>
        <div class="tab" id="tabDone" onclick="switchTab('resolved')">Karar Verilenler</div>
    </div>

    <div id="fileList"></div>

    <script>
        // BURAYA APPS SCRIPT URL'SİNİ YAPIŞTIR
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwI1jh0rksl7iu-qlclaPVwRyg-E2Kl7uW0B3tr5z5CojF2aRg89JkvdT6B1wgLz6c9/exec';
        
        const TOTAL_FILES = 1147;
        const BASE_RESOLVED = 661;
        let allFiles = [];
        let currentTab = 'pending';

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                // Google Sheets formatı: [ [Tarih, Yıl, No, Durum], [...] ]
                allFiles = data.slice(1).map(row => ({
                    date: row[0] || "",
                    year: row[1] || "",
                    num: row[2] || "Bilinmiyor",
                    status: row[3] === "Karar Verildi" ? "resolved" : "pending"
                }));
                document.getElementById('loader').style.display = 'none';
                render();
            } catch(e) { alert("Veri hatası!"); }
        }

        async function syncAction(params) {
            document.getElementById('loader').style.display = 'flex';
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(params) });
            await loadData();
        }

        function render() {
            const list = document.getElementById('fileList');
            const search = document.getElementById('searchBox').value.toLowerCase();
            list.innerHTML = '';

            const filtered = allFiles.filter(f => f.status === currentTab && f.num.toString().toLowerCase().includes(search));
            
            const resolvedCount = allFiles.filter(f => f.status === 'resolved').length + BASE_RESOLVED;
            const perc = (resolvedCount / TOTAL_FILES * 100).toFixed(2);
            
            document.getElementById('percDisplay').innerText = `%${perc.replace('.', ',')}`;
            document.getElementById('stats').innerText = `KARAR: ${resolvedCount} / ${TOTAL_FILES}`;
            document.getElementById('progressFill').style.width = perc + "%";

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="file-info">
                        <h4>${f.num}</h4>
                        <p>${f.date ? f.date : 'Tarih Girilmedi'}</p>
                    </div>
                    <div class="actions">
                        <button class="btn-icon btn-check" onclick="updateStatus('${f.num}', '${f.status}')">
                            <i data-lucide="${f.status === 'pending' ? 'check' : 'undo'}"></i>
                        </button>
                        <button class="btn-icon btn-edit" onclick="editFile('${f.num}', '${f.date}', '${f.year}')">
                            <i data-lucide="edit-3"></i>
                        </button>
                        <button class="btn-icon btn-del" onclick="deleteFile('${f.num}')">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function updateStatus(num, currentStatus) {
            const newStatus = currentStatus === "pending" ? "Karar Verildi" : "Bekliyor";
            syncAction({ action: "status", oldNum: num, status: newStatus });
        }

        function deleteFile(num) {
            if(confirm("Dosya silinsin mi?")) syncAction({ action: "delete", oldNum: num });
        }

        function editFile(num, date, year) {
            const newNum = prompt("Yeni Dosya No:", num);
            const newDate = prompt("Yeni Tarih:", date);
            const newYear = prompt("Yeni Yıl:", year);
            if(newNum) syncAction({ action: "update", oldNum: num, newNum, newDate, newYear });
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tabPending').className = t === 'pending' ? 'tab active' : 'tab';
            document.getElementById('tabDone').className = t === 'resolved' ? 'tab active' : 'tab';
            render();
        }

        loadData();
    </script>
</body>
</html>
