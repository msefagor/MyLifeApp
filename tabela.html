<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>101 Tabela MSEFAGOR</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-stroke: rgba(255, 255, 255, 0.22);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-color: #ffffff;
            --text-muted: rgba(255,255,255,0.55);
            --accent-color: #f1c40f;
            --danger-color: #ff6b81;
            --blue-color: #1e90ff;
            --siler-color: #7bed9f;
            --biz-color: #00cec9;
            --siz-color: #fab1a0;
            --biz-glow: rgba(0, 206, 201, 0.45);
            --siz-glow: rgba(250, 177, 160, 0.45);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: linear-gradient(135deg, #093028, #237a57, #093028);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        header {
            padding: 50px 15px 15px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 50; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            margin-bottom: 10px;
        }
        h1 { margin: 0; font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .game-badge {
            background: var(--accent-color); color: #000;
            padding: 2px 10px; border-radius: 8px; font-size: 12px; font-weight: 900;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }
        .header-btns { display: flex; gap: 8px; align-items: center; }
        .timer-display {
            background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 20px;
            font-family: 'Courier New', Courier, monospace; font-size: 14px;
            color: var(--siler-color); border: 1px solid var(--glass-border);
        }
        .settings-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 8px 16px; border-radius: 25px; font-size: 12px; font-weight: 600;
        }
        .game-container { flex: 1; overflow-y: auto; padding-bottom: 140px; }

        .grid-header {
            display: grid; grid-template-columns: 1.2fr 1.2fr 1fr 1fr 1.5fr 1.4fr;
            padding: 15px 5px; font-size: 10px; font-weight: 900; text-align: center;
            background: rgba(0,0,0,0.3); margin: 0 10px; border-radius: 15px;
            text-transform: uppercase; border: 1px solid var(--glass-border);
        }
        .game-row {
            display: grid; grid-template-columns: 1.2fr 1.2fr 1fr 1fr 1.5fr 1.4fr;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            min-height: 70px; margin: 5px 10px; border-radius: 12px;
            transition: all 0.3s;
        }
        .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px; text-align: center; flex-wrap: wrap; }
        .score-val { font-size: 18px; font-weight: 700; }

        /* Dağıtıcı Vurgusu */
        .dealer-active {
            font-weight: 900 !important;
            font-size: 14px !important;
            color: var(--accent-color) !important;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
            transform: scale(1.05);
        }
        .diff-text { font-size: 11px; font-weight: 800; }

        /* === KART STİLİ CEZA TAGLERI === */
        .penalty-card {
            display: inline-flex; flex-direction: column;
            align-items: center; justify-content: center;
            width: 22px; height: 30px;
            background: linear-gradient(180deg, #ffffff 0%, #ececec 100%);
            border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.22);
            box-shadow: 0 2px 5px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.85);
            margin: 1.5px;
            cursor: pointer;
            font-family: Georgia, 'Times New Roman', serif;
            line-height: 1;
            position: relative;
        }
        .penalty-card.tek { color: #1a1a1a; }
        .penalty-card.cift { color: #c0392b; }
        .pc-num { font-size: 11px; font-weight: 900; }
        .pc-suit { font-size: 8px; margin-top: 1px; }
        .penalty-card.cift::after {
            content: '×2'; position: absolute;
            top: 1px; right: 2px;
            font-size: 6px; font-weight: 900; color: #c0392b;
            font-family: -apple-system, sans-serif;
            line-height: 1;
        }
        .penalty-card.tek::after {
            content: '×1'; position: absolute;
            top: 1px; right: 2px;
            font-size: 6px; font-weight: 900; color: var(--blue-color);
            font-family: -apple-system, sans-serif;
            line-height: 1;
        }

        .footer-totals {
            position: fixed; bottom: 0; left: 0; right: 0; height: 115px;
            background: rgba(15, 20, 25, 0.9); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 25px; z-index: 60; border-top: 1px solid rgba(255,255,255,0.15);
        }
        .total-score { font-size: 32px; font-weight: 900; }
        .status-wrapper {
            position: relative; width: 130px; height: 90px;
            background: #1e272e; border-radius: 15px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 10; touch-action: none; cursor: crosshair; }
        .res-box { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
        .res-team { font-size: 12px; letter-spacing: 1px; }
        .res-diff { font-size: 28px; font-weight: 900; margin: 2px 0; }
        .res-label { font-size: 10px; opacity: 0.8; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(12px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: #1e272e; width: 90%; max-width: 420px;
            border-radius: 24px; padding: 22px; border: 1px solid var(--glass-border);
        }
        input[type="text"], input[type="number"], input[type="tel"], select {
            width: 100%; background: #000; border: 1px solid #333; color: #fff;
            padding: 12px; border-radius: 12px; font-size: 16px; box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--biz-color); }
        .calc-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #2d3436; color: white; font-weight: 800; font-size: 12px; cursor: pointer; }
        .calc-btn.active { background: var(--blue-color); box-shadow: 0 4px 10px rgba(30, 144, 255, 0.3); }
        .calc-btn.active.cift { background: var(--danger-color); box-shadow: 0 4px 10px rgba(255, 107, 129, 0.3); }
        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; margin-top: 10px; font-weight: 800; cursor: pointer; color: white; font-size: 14px; }
        .save-btn { background: linear-gradient(135deg, #00b894, #00cec9); color: #000; }

        /* === SKOR GİRİŞ EKRANI: BÜYÜK & RENKLİ OYUNCU İSİMLERİ === */
        .score-player-card {
            position: relative;
            padding: 16px 18px;
            border-radius: 18px;
            margin-bottom: 14px;
            border: 1px solid;
            overflow: hidden;
        }
        .score-player-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
        }
        .score-player-card.team-biz {
            background: linear-gradient(160deg, rgba(0,206,201,0.18), rgba(0,206,201,0.04));
            border-color: rgba(0, 206, 201, 0.45);
        }
        .score-player-card.team-biz::before { background: var(--biz-color); box-shadow: 0 0 14px var(--biz-glow); }
        .score-player-card.team-siz {
            background: linear-gradient(160deg, rgba(250,177,160,0.18), rgba(250,177,160,0.04));
            border-color: rgba(250, 177, 160, 0.45);
        }
        .score-player-card.team-siz::before { background: var(--siz-color); box-shadow: 0 0 14px var(--siz-glow); }

        .player-team-tag {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 10.5px; font-weight: 900;
            letter-spacing: 1.6px; text-transform: uppercase;
            margin-bottom: 6px; opacity: 0.85;
        }
        .player-team-tag::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: currentColor; box-shadow: 0 0 8px currentColor;
        }
        .score-player-card.team-biz .player-team-tag { color: var(--biz-color); }
        .score-player-card.team-siz .player-team-tag { color: var(--siz-color); }
        .player-name-big {
            font-size: 24px; font-weight: 900; letter-spacing: -0.5px;
            line-height: 1.05; margin-bottom: 12px;
        }
        .score-player-card.team-biz .player-name-big {
            background: linear-gradient(135deg, #ffffff, var(--biz-color));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 2px 14px var(--biz-glow);
        }
        .score-player-card.team-siz .player-name-big {
            background: linear-gradient(135deg, #ffffff, var(--siz-color));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 2px 14px var(--siz-glow);
        }

        /* === AYARLAR: HAVUZ + DAĞITICI === */
        .section-block {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 14px 14px 12px;
            margin-bottom: 14px;
        }
        .section-label {
            display: block; font-size: 11px; font-weight: 800;
            letter-spacing: 1.4px; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 10px;
        }
        .section-label.tone-biz { color: var(--biz-color); }
        .pool-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .pool-row input { flex: 1; padding: 10px 12px; font-size: 14px; }
        .pool-del-btn {
            background: rgba(255, 107, 129, 0.15); border: 1px solid rgba(255, 107, 129, 0.45);
            color: var(--danger-color); width: 38px; height: 38px;
            border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            line-height: 1;
        }
        .pool-add-btn {
            width: 100%; padding: 10px; border: 1px dashed var(--glass-stroke);
            background: transparent; color: var(--text-muted);
            border-radius: 10px; font-size: 12.5px; font-weight: 700; cursor: pointer;
            margin-top: 4px;
        }
        .pool-add-btn:active { background: rgba(255,255,255,0.08); }

        .dealer-row {
            display: grid; grid-template-columns: 90px 1fr; gap: 10px;
            margin-bottom: 8px; align-items: center;
        }
        .dealer-tag {
            font-size: 11px; font-weight: 900; color: var(--accent-color);
            letter-spacing: 0.6px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.4);
            display: flex; align-items: center; gap: 6px;
        }
        .dealer-tag .dealer-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--accent-color); color: #000;
            font-size: 11px; font-weight: 900;
            box-shadow: 0 0 12px rgba(241, 196, 15, 0.5);
        }
        .dealer-row select { padding: 10px 12px; font-size: 14px; }

        /* Ceza modali kart-stili buton tutucusu */
        #penalty-list { padding: 4px 0; }
        #num-grid .calc-btn { font-size: 14px; padding: 12px 0; font-weight: 900; }
    </style>
</head>
<body>
    <header class="glass-panel">
        <h1>MSEFAGOR <span class="game-badge" id="kalan-oyun">11</span></h1>
        <div class="header-btns">
            <div class="timer-display" id="game-timer">00:00</div>
            <button class="settings-btn" onclick="openSettings()">Ayarlar</button>
        </div>
    </header>

    <div class="grid-header glass-panel">
        <div>Biz</div>
        <div>Siz</div>
        <div>B.Cz</div>
        <div>S.Cz</div>
        <div>Dağıtan</div>
        <div>Fark</div>
    </div>

    <div class="game-container" id="game-rows"></div>

    <div class="footer-totals">
        <div class="total-box" style="text-align: center;">
            <div style="font-size:10px; opacity:0.6; margin-bottom:5px;">BİZ TOPLAM</div>
            <div class="total-score" id="total-biz" style="color:var(--biz-color)">0</div>
        </div>
        <div class="status-wrapper">
            <div id="result-content" class="res-box"></div>
            <canvas id="scratch-canvas"></canvas>
        </div>
        <div class="total-box" style="text-align: center;">
            <div style="font-size:10px; opacity:0.6; margin-bottom:5px;">SİZ TOPLAM</div>
            <div class="total-score" id="total-siz" style="color:var(--siz-color)">0</div>
        </div>
    </div>

    <!-- SKOR GİRİŞ MODALİ -->
    <div id="score-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="text-align:center; margin:0 0 18px 0;" id="sc-title">Skor Girişi</h3>

            <div class="score-player-card" id="player-card-1">
                <div class="player-team-tag" id="p1-team-tag">Eş 1</div>
                <div class="player-name-big" id="p1-name">—</div>
                <input type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" id="sc1-val" placeholder="Sayı girin">
                <div style="display:flex; gap:6px; margin-top:10px;">
                    <button id="m1-1" class="calc-btn active" onclick="setM(1,1)">DÜZ ×1</button>
                    <button id="m1-2" class="calc-btn" onclick="setM(1,2)">ÇİFT ×2</button>
                </div>
            </div>

            <div class="score-player-card" id="player-card-2">
                <div class="player-team-tag" id="p2-team-tag">Eş 2</div>
                <div class="player-name-big" id="p2-name">—</div>
                <input type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" id="sc2-val" placeholder="Sayı girin">
                <div style="display:flex; gap:6px; margin-top:10px;">
                    <button id="m2-1" class="calc-btn active" onclick="setM(2,1)">DÜZ ×1</button>
                    <button id="m2-2" class="calc-btn" onclick="setM(2,2)">ÇİFT ×2</button>
                </div>
            </div>

            <div style="text-align:center; padding: 12px; background: rgba(255,255,255,0.04); border-radius: 14px; margin-top: 4px;">
                <div id="modal-siler-icons" style="color:var(--siler-color); font-size:24px; min-height:30px; line-height: 1;"></div>
                <div style="display:flex; gap:10px; margin-top:8px;">
                    <button class="calc-btn" onclick="changeSiler(-1)">Siler −</button>
                    <button class="calc-btn" style="background:var(--siler-color); color:#000" onclick="changeSiler(1)">Siler +</button>
                </div>
            </div>

            <button class="action-btn save-btn" onclick="applyScore()">SKORU KAYDET</button>
            <button class="action-btn" style="background:transparent; color:#888" onclick="closeModals()">Vazgeç</button>
        </div>
    </div>

    <!-- AYARLAR MODALİ -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <h3 style="text-align:center; margin: 0 0 14px;">Oyun Ayarları</h3>

            <div class="section-block">
                <span class="section-label">Oyuncu Havuzu</span>
                <div id="pool-list"></div>
                <button class="pool-add-btn" onclick="addPoolName()">+ Yeni oyuncu ekle</button>
            </div>

            <div class="section-block">
                <span class="section-label">Masa Sırası — Kaçıncı Dağıtıcı?</span>
                <div id="dealer-list"></div>
            </div>

            <div class="section-block">
                <span class="section-label tone-biz">BİZ Takımı (Dağıtıcı Pozisyonu)</span>
                <div class="dealer-row">
                    <span class="dealer-tag" style="color:var(--biz-color); text-shadow:0 0 10px var(--biz-glow);">Eş 1</span>
                    <select id="sel-biz1"></select>
                </div>
                <div class="dealer-row">
                    <span class="dealer-tag" style="color:var(--biz-color); text-shadow:0 0 10px var(--biz-glow);">Eş 2</span>
                    <select id="sel-biz2"></select>
                </div>
            </div>

            <button class="action-btn save-btn" onclick="saveSettings()">AYARLARI UYGULA</button>
            <button class="action-btn" style="background:var(--danger-color)" onclick="resetGame()">OYUNU SIFIRLA</button>
            <button class="action-btn" style="background:#333" onclick="closeModals()">Kapat</button>
        </div>
    </div>

    <!-- CEZA MODALİ -->
    <div id="penalty-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="text-align:center; margin-top:0;">Ceza Ekle</h3>
            <div style="display:flex; gap:8px; margin-bottom:14px;">
                <button class="calc-btn active" id="btn-tek" onclick="setPMode('tek')">TEK (×10)</button>
                <button class="calc-btn" id="btn-cift" onclick="setPMode('cift')">ÇİFT (×20)</button>
            </div>
            <div id="num-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;"></div>
            <div id="penalty-list" style="display:flex; flex-wrap:wrap; gap:4px; margin-top:14px;"></div>
            <button class="action-btn" style="background:#333" onclick="closeModals()">Kapat</button>
        </div>
    </div>

    <script>
        // === DATA MODELİ ===
        // Önceden yazılmış havuz isimleri (her zaman mevcut)
        let playerPool = ["Sefa", "Fatih", "Halil", "İlker"];
        // 4 dağıtıcı pozisyonu için havuz indexleri (1., 2., 3., 4. dağıtıcı)
        let dealerOrder = [0, 1, 2, 3];
        // BİZ takımının pozisyonları (dealerOrder içinde 0-3)
        let bizPositions = [0, 2];

        let gameData = [];
        let activeR = 0, activeC = '', m1 = 1, m2 = 1, tSiler = 0, curPMode = 'tek';
        let timerInt = null, tStart = null;

        const canv = document.getElementById('scratch-canvas');
        const ctx = canv.getContext('2d');

        window.onload = () => {
            initData(); loadAll(); render();
            const grid = document.getElementById('num-grid');
            for (let i = 1; i <= 13; i++) {
                let b = document.createElement('button');
                b.className = 'calc-btn'; b.innerText = i;
                b.onclick = () => {
                    gameData[activeR][activeC].push({ val: i * (curPMode === 'tek' ? 10 : 20), mode: curPMode });
                    render(); renderPL();
                };
                grid.appendChild(b);
            }
            initScratch();
        };

        function initData() {
            gameData = Array.from({ length: 11 }, () => ({
                bizScore: { val: 0, siler: 0 },
                sizScore: { val: 0, siler: 0 },
                bizCeza: [], sizCeza: []
            }));
        }

        // Aktif oyuncuların isimlerini dağıtıcı sırasına göre döner
        function getActivePlayers() {
            return dealerOrder.map(i => playerPool[i] || `Oyu ${i + 1}`);
        }

        // === AYARLAR ===
        function openSettings() {
            renderPlayerPool();
            renderDealerSelectors();
            renderBizSelectors();
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function renderPlayerPool() {
            const c = document.getElementById('pool-list');
            c.innerHTML = '';
            playerPool.forEach((name, i) => {
                const row = document.createElement('div');
                row.className = 'pool-row';
                row.innerHTML = `
                    <input type="text" value="${escapeAttr(name)}" placeholder="Oyuncu ${i + 1}"
                           oninput="updatePoolName(${i}, this.value)">
                    ${playerPool.length > 4
                      ? `<button class="pool-del-btn" onclick="removePoolName(${i})" aria-label="Sil">×</button>`
                      : ''}
                `;
                c.appendChild(row);
            });
        }

        function updatePoolName(i, val) { playerPool[i] = val; refreshPoolDependent(); }

        function addPoolName() {
            playerPool.push(`Yeni Oyuncu ${playerPool.length + 1}`);
            renderPlayerPool();
            refreshPoolDependent();
        }

        function removePoolName(i) {
            if (playerPool.length <= 4) return;
            playerPool.splice(i, 1);
            // Dağıtıcı sırasını güncelle (silinen index'e bakanlar 0'a düşer)
            dealerOrder = dealerOrder.map(idx => idx >= playerPool.length ? 0 : idx);
            renderPlayerPool();
            refreshPoolDependent();
        }

        function refreshPoolDependent() {
            // Dropdown'ların seçeneklerini güncelle (seçilen index'leri koru)
            renderDealerSelectors();
            renderBizSelectors();
        }

        function renderDealerSelectors() {
            const c = document.getElementById('dealer-list');
            c.innerHTML = '';
            for (let pos = 0; pos < 4; pos++) {
                const row = document.createElement('div');
                row.className = 'dealer-row';
                const tag = `<span class="dealer-tag"><span class="dealer-num">${pos + 1}</span>Dağıtıcı</span>`;
                let opts = '';
                playerPool.forEach((name, i) => {
                    opts += `<option value="${i}" ${i === dealerOrder[pos] ? 'selected' : ''}>${escapeHtml(name)}</option>`;
                });
                row.innerHTML = `${tag}<select id="dealer-${pos}">${opts}</select>`;
                c.appendChild(row);
            }
        }

        function renderBizSelectors() {
            const s1 = document.getElementById('sel-biz1');
            const s2 = document.getElementById('sel-biz2');
            s1.innerHTML = ''; s2.innerHTML = '';
            for (let pos = 0; pos < 4; pos++) {
                const playerName = playerPool[dealerOrder[pos]] || `?`;
                s1.add(new Option(`${pos + 1}. Dağıtıcı — ${playerName}`, pos));
                s2.add(new Option(`${pos + 1}. Dağıtıcı — ${playerName}`, pos));
            }
            s1.value = bizPositions[0];
            s2.value = bizPositions[1];
        }

        function saveSettings() {
            // Havuz isimlerini güncelle
            const inputs = document.querySelectorAll('#pool-list input');
            inputs.forEach((inp, i) => {
                playerPool[i] = (inp.value || `Oyu ${i + 1}`).trim();
            });
            // Dağıtıcı sırasını oku
            for (let pos = 0; pos < 4; pos++) {
                const sel = document.getElementById(`dealer-${pos}`);
                if (sel) dealerOrder[pos] = parseInt(sel.value);
            }
            // BİZ pozisyonlarını oku
            const b1 = parseInt(document.getElementById('sel-biz1').value);
            const b2 = parseInt(document.getElementById('sel-biz2').value);
            if (b1 === b2) {
                alert('BİZ takımının iki üyesi aynı dağıtıcı pozisyonunda olamaz.');
                return;
            }
            bizPositions = [b1, b2];
            closeModals(); render();
        }

        // === SKOR MODALİ ===
        function openScoreModal(r, c) {
            activeR = r; activeC = c;
            const isBiz = c === 'bizScore';
            const teamPos = isBiz ? bizPositions : [0, 1, 2, 3].filter(p => !bizPositions.includes(p));
            const active = getActivePlayers();
            const card1 = document.getElementById('player-card-1');
            const card2 = document.getElementById('player-card-2');
            card1.className = 'score-player-card ' + (isBiz ? 'team-biz' : 'team-siz');
            card2.className = 'score-player-card ' + (isBiz ? 'team-biz' : 'team-siz');
            document.getElementById('p1-team-tag').textContent = (isBiz ? 'BİZ — Eş 1' : 'SİZ — Eş 1');
            document.getElementById('p2-team-tag').textContent = (isBiz ? 'BİZ — Eş 2' : 'SİZ — Eş 2');
            document.getElementById('p1-name').textContent = active[teamPos[0]] || '—';
            document.getElementById('p2-name').textContent = active[teamPos[1]] || '—';
            document.getElementById('sc-title').textContent = isBiz ? 'BİZ — Skor Girişi' : 'SİZ — Skor Girişi';
            document.getElementById('sc1-val').value = '';
            document.getElementById('sc2-val').value = '';
            m1 = 1; m2 = 1; tSiler = gameData[r][c].siler;
            updateScoreUI();
            document.getElementById('score-modal').style.display = 'flex';
        }
        function setM(p, m) { if (p === 1) m1 = m; else m2 = m; updateScoreUI(); }
        function changeSiler(v) { tSiler = Math.max(0, tSiler + v); updateScoreUI(); }
        function updateScoreUI() {
            document.getElementById('m1-1').className = m1 === 1 ? 'calc-btn active' : 'calc-btn';
            document.getElementById('m1-2').className = m1 === 2 ? 'calc-btn active cift' : 'calc-btn';
            document.getElementById('m2-1').className = m2 === 1 ? 'calc-btn active' : 'calc-btn';
            document.getElementById('m2-2').className = m2 === 2 ? 'calc-btn active cift' : 'calc-btn';
            document.getElementById('modal-siler-icons').textContent = tSiler > 0 ? '∞ '.repeat(tSiler) : '—';
        }
        function applyScore() {
            const v1 = parseInt(document.getElementById('sc1-val').value) || 0;
            const v2 = parseInt(document.getElementById('sc2-val').value) || 0;
            gameData[activeR][activeC].val = (v1 * m1) + (v2 * m2);
            gameData[activeR][activeC].siler = tSiler;
            if (!timerInt) { tStart = Date.now(); timerInt = setInterval(updateT, 1000); }
            closeModals(); render();
        }

        // === RENDER ===
        function makePenaltyCardHtml(c) {
            const num = c.mode === 'tek' ? c.val / 10 : c.val / 20;
            const suit = c.mode === 'tek' ? '♠' : '♥';
            return `<span class="penalty-card ${c.mode}"><span class="pc-num">${num}</span><span class="pc-suit">${suit}</span></span>`;
        }

        function render() {
            const container = document.getElementById('game-rows');
            container.innerHTML = '';
            const active = getActivePlayers();
            let bT = 0, sT = 0, count = 0;
            gameData.forEach((row, i) => {
                const bS = row.bizScore.val + (row.bizScore.siler * -100) + row.bizCeza.reduce((a, b) => a + b.val, 0);
                const sS = row.sizScore.val + (row.sizScore.siler * -100) + row.sizCeza.reduce((a, b) => a + b.val, 0);
                bT += bS; sT += sS;
                if (row.bizScore.val !== 0 || row.sizScore.val !== 0 || row.bizCeza.length > 0 || row.sizCeza.length > 0) count++;

                // i-th oyunda dağıtan: dealerOrder[i % 4] havuz indeksindeki oyuncu
                const dealerName = active[i % 4];
                const isDealer = (count === i);
                const diff = bS - sS;
                let diffHtml = '<span style="opacity:0.2">-</span>';
                if (bS !== 0 || sS !== 0) {
                    if (diff < 0) diffHtml = `<span style="color:var(--biz-color)" class="diff-text">BİZ +${Math.abs(diff)}</span>`;
                    else if (diff > 0) diffHtml = `<span style="color:var(--siz-color)" class="diff-text">SİZ +${Math.abs(diff)}</span>`;
                    else diffHtml = "EŞİT";
                }
                const bizCezaHtml = row.bizCeza.map(makePenaltyCardHtml).join('');
                const sizCezaHtml = row.sizCeza.map(makePenaltyCardHtml).join('');

                container.insertAdjacentHTML('beforeend', `
                    <div class="game-row">
                        <div class="cell" onclick="openScoreModal(${i},'bizScore')">
                            <span class="score-val">${row.bizScore.val || '-'}</span>
                            <div class="siler-icons">${'∞'.repeat(row.bizScore.siler)}</div>
                        </div>
                        <div class="cell" onclick="openScoreModal(${i},'sizScore')">
                            <span class="score-val">${row.sizScore.val || '-'}</span>
                            <div class="siler-icons">${'∞'.repeat(row.sizScore.siler)}</div>
                        </div>
                        <div class="cell" onclick="openPenaltyModal(${i},'bizCeza')">${bizCezaHtml}</div>
                        <div class="cell" onclick="openPenaltyModal(${i},'sizCeza')">${sizCezaHtml}</div>
                        <div class="cell ${isDealer ? 'dealer-active' : ''}" style="font-size:11px; opacity:0.6">${escapeHtml(dealerName)}</div>
                        <div class="cell">${diffHtml}</div>
                    </div>
                `);
            });
            document.getElementById('total-biz').innerText = bT;
            document.getElementById('total-siz').innerText = sT;
            document.getElementById('kalan-oyun').innerText = Math.max(0, 11 - count);
            updateStatus(bT, sT);
            saveAll();
        }

        function updateStatus(b, s) {
            const res = document.getElementById('result-content');
            const diff = Math.abs(b - s);
            if (b < s) {
                res.innerHTML = `<div class="res-team" style="color:var(--biz-color)">BİZ</div><div class="res-diff" style="color:white">${diff}</div><div class="res-label" style="color:var(--biz-color)">ÖNDE</div>`;
            } else if (s < b) {
                res.innerHTML = `<div class="res-team" style="color:var(--siz-color)">SİZ</div><div class="res-diff" style="color:white">${diff}</div><div class="res-label" style="color:var(--siz-color)">ÖNDE</div>`;
            } else {
                res.innerHTML = `<div class="res-team">DURUM</div><div class="res-diff">0</div><div class="res-label">EŞİT</div>`;
            }
            initScratch();
        }

        function updateT() {
            const d = Math.floor((Date.now() - tStart) / 1000);
            document.getElementById('game-timer').innerText = `${Math.floor(d / 60).toString().padStart(2, '0')}:${(d % 60).toString().padStart(2, '0')}`;
        }

        function setPMode(m) {
            curPMode = m;
            document.getElementById('btn-tek').className = m === 'tek' ? 'calc-btn active' : 'calc-btn';
            document.getElementById('btn-cift').className = m === 'cift' ? 'calc-btn active cift' : 'calc-btn';
        }
        function openPenaltyModal(r, c) { activeR = r; activeC = c; renderPL(); document.getElementById('penalty-modal').style.display = 'flex'; }
        function renderPL() {
            const c = document.getElementById('penalty-list');
            c.innerHTML = '';
            gameData[activeR][activeC].forEach((p, i) => {
                const wrap = document.createElement('span');
                wrap.innerHTML = makePenaltyCardHtml(p);
                const cardEl = wrap.firstChild;
                cardEl.title = 'Silmek için tıkla';
                cardEl.onclick = () => { gameData[activeR][activeC].splice(i, 1); render(); renderPL(); };
                c.appendChild(cardEl);
            });
        }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        function resetGame() { if (confirm("Tüm oyun sıfırlansın mı?")) { localStorage.clear(); location.reload(); } }

        // === STORAGE ===
        function saveAll() {
            localStorage.setItem('101_v4_data', JSON.stringify(gameData));
            localStorage.setItem('101_v5_pool',  JSON.stringify(playerPool));
            localStorage.setItem('101_v5_order', JSON.stringify(dealerOrder));
            localStorage.setItem('101_v5_bpos',  JSON.stringify(bizPositions));
        }
        function loadAll() {
            try {
                const d = localStorage.getItem('101_v4_data');
                if (d) gameData = JSON.parse(d);

                const pool = localStorage.getItem('101_v5_pool');
                const ord = localStorage.getItem('101_v5_order');
                const bp  = localStorage.getItem('101_v5_bpos');

                if (pool && ord && bp) {
                    playerPool   = JSON.parse(pool);
                    dealerOrder  = JSON.parse(ord);
                    bizPositions = JSON.parse(bp);
                } else {
                    // Eski v4 verisini migrate et
                    const oldP = localStorage.getItem('101_v4_p');
                    const oldB = localStorage.getItem('101_v4_biz');
                    if (oldP) playerPool = JSON.parse(oldP);
                    if (oldB) bizPositions = JSON.parse(oldB);
                    dealerOrder = [0, 1, 2, 3];
                }
                // Sağlamlık kontrolleri
                while (playerPool.length < 4) playerPool.push(`Oyu ${playerPool.length + 1}`);
                dealerOrder = dealerOrder.map(idx => (typeof idx === 'number' && idx < playerPool.length) ? idx : 0);
                while (dealerOrder.length < 4) dealerOrder.push(0);
                if (!Array.isArray(bizPositions) || bizPositions.length !== 2) bizPositions = [0, 2];
            } catch (e) {
                console.warn('Veri yükleme hatası:', e);
            }
        }

        // === KAZI-KAZAN ===
        function initScratch() {
            canv.width = canv.parentNode.offsetWidth; canv.height = canv.parentNode.offsetHeight;
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#95a5a6'; ctx.fillRect(0, 0, canv.width, canv.height);
            ctx.fillStyle = '#2c3e50'; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("KAZI", canv.width / 2, canv.height / 2 + 5);
            ctx.globalCompositeOperation = 'destination-out';
        }
        canv.addEventListener('touchstart', e => { e.preventDefault(); scratch(e); });
        canv.addEventListener('touchmove', e => { e.preventDefault(); scratch(e); });
        function scratch(e) {
            const r = canv.getBoundingClientRect(); const t = e.touches[0];
            ctx.beginPath(); ctx.arc(t.clientX - r.left, t.clientY - r.top, 18, 0, Math.PI * 2); ctx.fill();
        }

        // === HELPERLAR ===
        function escapeHtml(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function escapeAttr(s) {
            return String(s || '').replace(/"/g, '&quot;');
        }
    </script>
    <script>
        // URL'den tarih senk. (ana sayfadan tarih gönderiliyorsa — bu sayfada kullanmıyoruz ama yine de safe parse)
        (function syncDateFromUrl() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                urlParams.get('date'); // okunup yutulur, herhangi bir state'i etkilemez
            } catch (e) { /* sessizce yut */ }
        })();
    </script>
</body>
